body:
  text: 補遺方竹葉黃耆湯見心法腫潰門托裡黃耆湯黃耆六錢炒甘草炙栝蔞根各一錢水二盅煎八分頻服之加人參一錢尤妙托裡養榮湯人參黃耆炙當歸酒拌芍藥炒熟地黃麥門冬去心川芎白朮各一錢五味子研炙甘草各五分水二盅姜三片棗二枚煎八分食遠服黃耆六一湯綿黃耆六兩用淡鹽水潤飯上蒸焙乾甘草一兩一半生一半炙每銼一兩水二盅煎八分食遠服或為細末每服二錢早晨日午白湯調服或加人參尤妙七味白朮散白朮茯苓去皮人參各七錢甘草一兩五錢炙木香二錢五分藿香葉葛根半兩上為細末每服三五錢白湯調下竹葉石膏湯淡竹葉石膏桔梗木通薄荷甘草炙上姜水煎服元參散元參黃連去須土瓜根麥門冬去心赤芍藥白蘚皮各一兩升麻七錢五分火麻仁川朴硝川大黃各一兩銼炒上銼每服三錢水一盞入生地黃一錢細切同煎至六分不拘時服葛根散葛根黃耆升麻麥門冬栝蔞根赤芍藥梔子仁生地黃各一兩黃芩七錢半甘草半兩生上銼每服四錢水一盅盞煎六分去滓無時溫服乾葛飲黃芩朴硝各一兩二錢半乾葛一兩上銼散每服三錢用枇杷葉去背上白毛淨洗同煎不拘時服五味子湯黃耆三錢蜜炙人參二兩五味子麥門冬各一兩去心粉甘草五錢炙每服五錢水煎日夜服五七劑加減八味地黃丸熟地黃八兩蒸乾山藥山茱萸肉五味子各四兩牡丹皮白茯苓澤瀉各三兩酒浸蒸焙肉桂二兩上各另為末入地黃和勻加煉蜜丸如梧桐子大每服七八十丸空心食前白湯下橘半胃苓湯橘紅半夏各一錢薑製蒼朮米泔浸炒白朮炒厚朴薑製甘草炙茯苓人參澤瀉茅根各二錢薑汁數匙水二盅煎一盅入薑汁一二沸作十餘次飲之加減托裡消毒散胃氣虛者去白芷連翹金銀花加參朮藿香托裡健中湯人參白朮茯苓各二錢半夏炮姜各一錢炙甘草五分黃耆一錢五分肉桂三分上薑棗水煎服托裡益中湯人參白朮陳皮半夏茯苓炮姜各一錢木香炙甘草各五分上薑棗水煎服托裡抑青湯人參白朮茯苓半夏各一錢芍藥柴胡甘草各五分陳皮一錢上薑棗水煎服托裡清中湯人參白朮陳皮茯苓各一錢半夏八分桔梗七分甘草五分上薑棗水煎服托裡益黃湯人參白朮陳皮茯苓半夏各一錢丁香甘草炙炮姜各五分薑棗水煎服托裡越鞠湯人參白朮各二錢陳皮半夏各一錢山梔川芎香附米蒼朮各七分炙甘草五分上薑棗水煎服人參理中湯白朮人參乾薑甘草各等分炙上薑棗水煎服加味解毒湯黃耆炒鹽水拌黃連炒黃芩炒黃柏炒連翹當歸各七分酒拌甘草炙白芍藥梔子仁各一錢炒作一劑水二盅煎七分服之藥下痛即止內補黃耆湯見心法腫潰門當歸和血散當歸二錢乳香半錢沒藥一錢半白芍藥三錢上為細末每服一錢水一盞煎七分和滓溫服回瘡金銀花散金銀花連枝葉俱用銼研二兩黃耆四兩甘草一兩上㕮咀用酒一升同入壺瓶內閉口重湯煮三兩時辰取出去滓頓服之又一方無黃耆郭氏定痛托裡散慄殼二兩去蒂炒當歸白芍藥川芎各五錢乳香沒藥桂各三錢上㕮咀每服五錢水煎乳香止痛散慄殼六兩制白芷三兩陳皮甘草炙各兩半乳香沒藥各一兩丁香五錢上㕮咀每服三錢水一盞半煎乳香黃耆散見心法腫潰門人參內托散人參黃耆當歸川芎厚朴防風桔梗白芷官桂紫草木香甘草上入糯米一撮水煎服乳香丸乳香另研沒藥另研羌活五靈脂各三錢當歸真綠豆粉交趾桂各兩半獨活三錢川芎川白芷白膠香各兩半上為細末煉蜜丸如彈子大每服一丸細嚼薄荷湯送下手足損痛不能起者加草烏用木瓜鹽湯送下乳香定痛散乳香沒藥各五錢寒水石滑石各一兩冰片一錢上為細末擦患處痛即止豆豉餅見心法首卷乳香膏乳香一兩另研食鹽松脂杏仁去皮尖研各一兩半生地取汁三合白羊腎𦚠脂半斤黃蠟三兩上先熬脂令沸下杏仁地黃汁蠟煎候蠟熔盡入香鹽松枝煎以柳箄攪令勻稀稠得所瓷盒盛又乳香膏木鱉子去殼細銼當歸各一兩柳枝二八寸寸同以清油四兩煎令黑色次用後藥乳香沒藥各兩半白膠香明淨者四兩同研細入油煎化用棉子濾之上煉藥鐵銚令極淨再傾前藥油蠟在內候溫入黃丹一兩半以兩柳枝攪極得所再上火煎不住手攪候油沸起住攪注在水中成珠不散為度秋冬欲軟春夏欲堅傾在水中出火毒搜成劑收之東垣聖愈湯熟地生地各三錢歸身錢半川芎二錢黃耆五分人參三分上㕮咀都作一服水一盞半煎至一盞去滓稍熱服無時濟生犀角地黃丸犀角鎊末生地赤芍牡丹皮各錢半升麻黃芩各一錢炒上水煎熟入犀角末服獨參湯見心法腫潰門托裡消毒散加減法膿多帶赤血虛也去金銀花連翹白芷加歸地參術如不應用八珍湯加牡丹皮內消沃雪湯治發背並五臟內癰尻臀諸腫大小腸癰肛門臟毒初起但未出膿堅硬疼痛不可忍者並服青皮穿山甲貝母陳皮連翹白芍乳香沒藥黃耆甘草節白芷射干天花粉金銀花皂角刺各八分木香四分當歸大黃各二錢水酒各一碗煎八分量病上下食前後服之二蛟散治生冷惱怒傷脾致胸膈不寬小水不利面目四肢浮腫諸藥不效用三年老黃米炒焦黃色為末提淨芒硝三兩鍋內熔化炒乾為末每料一平杯和勻再碾極細大人壯實者每服三錢小兒十歲上下者一錢二分俱赤砂糖三茶匙和白滾水半茶盅空心調服至午大便一次至晚便一次其疾先從眼胞消起日久元氣虛者與加味胃苓湯間服至重者不過五服愈解毒木通湯治男婦房術熱藥所傷致玉莖陰戶癢痛小水澀痛白濁滑精至夜陽物興舉不得眠者服之木通黃連龍膽草瞿麥滑石山梔黃柏知母各一錢蘆薈甘草各五分水二盅燈心二根煎八分食前服天漿散治腦疽積毒日深堅腫木痛口燥舌乾噁心煩渴六脈沉實有力大便閉結不通者並宜服之石決明生研殭蠶穿山甲土炒防風連翹羌活乳香金銀花黃連歸尾各一錢大黃三錢天花粉新鮮未曬者四兩石臼內搗爛投水一碗攪勻絞去渣用上花粉淨汁一碗半同藥煎至八分入酒一杯空心熱服行過三次方用飲食忌食煎炒發物黃耆湯治濕熱腿內近膝股患癰或附骨癰初起腫痛此太陽厥陰之分也脈細而弦按之洪緩有力黃耆鹽水拌炒當歸柴胡木瓜連翹各一錢羌活肉桂生地黃黃柏各五分水酒各一盅煎一半空心熱服獨參湯治潰瘍膿水出多血氣虛極或惡寒或自汗冷汗手足指甲青冷或身涼脈細並宜人參二兩切片作二劑水二盅棗十枚煎一盅徐徐服之若煎至稠厚即為膏矣作三次用好溫酒化服亦可神應異功散治潰瘍陰盛陽虛發熱作渴手足並冷脈虛無力大便自利至飲沸湯而不知其熱者必服之木香官桂當歸人參茯苓陳皮白朮各一錢半夏丁香肉豆蔻附子厚朴各五分水二盅姜五片棗三枚煎八分不拘時服此方癰疽陰症凡雜症陽氣脫陷與寒氣逼陽於外者發熱煩燥口乾作渴投以薑桂附子之類津液頓生煩熱頓退其應如響人但不習而察之參朮膏治癰疽發背等症大膿後氣血大虛急宜用此上好人參半斤切片用水五大碗銀鍋內慢火熬至三碗將渣再煎汁一碗共用蜜絹濾清復熬稠厚瓷碗內收貯聽用云片白朮六兩懷慶熟地六兩俱熬同上法以上三膏各熬完畢各用瓷碗盛之頓入水中待冷取起蓋勿泄氣如患者精神短少懶於言動短氣自汗者以人參膏三匙白朮膏二匙地黃膏二匙俱用無灰好酒一杯頓熱化服如脾氣虛弱飲食減少或飲食不化者用白朮膏三匙人參膏二匙地黃膏一匙好熱酒化服如患者腰膝痠軟腿腳無力皮膚手足粗澀枯槁者用地黃膏三匙人參白朮膏各三匙化服如氣血脾胃相等無偏勝負者三膏每各二匙熱酒化服此膏用於清晨並臨睡時各進一次自然強健精神頓生氣血新肉易生瘡口易合若瘡危險勢大膿多者可保終無變症夏天炎熱恐膏易變分作二次熬用亦好愈後能服鬚髮變黑返老還童清咽利膈湯治積熱咽喉腫痛痰涎壅盛及乳蛾喉痹喉癰重舌或胸膈不利煩躁飲冷大便秘結等症連翹黃芩甘草桔梗荊芥防風黨參各一錢大黃朴硝各二錢水二盅煎八分食遠服人參五味湯治氣血勞傷咳膿或咯血寒熱往來羸瘦困乏一切虛損之症並效人參五味子前胡陳皮白朮桔梗當歸茯苓熟地甘草各一錢黃耆地骨皮桑白皮枳殼柴胡各五分水二盅姜三片煎八分食後服人中白散治小兒口疳走馬疳及牙齦腐爛黑臭者極效人中白溺壺者佳煅紅二兩孩兒茶一兩黃柏薄荷青黛各末六錢冰片五分共研極細先用溫湯漱淨吹藥疳上日用六七次藥涎從外流為吉內收涎毒入里為凶珍珠散治下疳皮損腐爛痛極難忍及諸瘡新肉已滿不能生皮又湯潑火燒皮損肉爛疼痛不止者青缸花五分如無用頭刀靛花輕虛色翠者代之終不及缸花為妙珍珠一錢不拘大小以新白為上入豆腐內煮數滾研為極細真輕粉一兩上三味共研千轉細如飛面方入罐收貯凡下疳初起皮損搽之即愈腐爛疼痛者甘草湯洗淨豬脊髓調搽如諸瘡不生皮者用此乾摻即可生皮又婦人陰蝕瘡或新嫁內傷痛甚者亦用此搽極效湯潑火燒痛甚者用紅膏調搽之普濟消毒飲治疫癘憎寒壯熱頭面腫盛目不能開上喘咽喉不利口乾舌燥俗云大頭瘟病諸藥不效元泰和二年東垣制以濟人活甚眾時人皆曰天方黃芩酒炒黃連酒炒各五錢人參三錢橘紅元參生甘草桔梗柴胡各二錢薄荷葉連翹牛蒡子馬屁勃各一錢白殭蠶炒升麻各七分上為細末半用湯調時時服之半用蜜丸噙化服盡良愈或加防風川芎當歸薄荷細辛水二盅煎一盅食遠稍熱服如大便硬加酒蒸大黃一二錢以利之或熱腫甚者以針砭刺出血六和湯治夏秋暑濕傷脾或飲冷乘風多食瓜果以致客寒犯胃食留不化遂成痞膈霍亂嘔吐及廣南夏月瘴疾寒熱等證半夏人參炙甘草砂仁杏仁各一錢赤茯苓扁豆藿香木瓜各二錢上㕮咀每服五錢水二盅生薑三片棗二枚煎溫服一方有白朮香薷厚朴各一錢名六和半夏湯嘉禾散一名穀神散治脾胃不和胸膈痞悶氣逆生痰不進飲食五膈五噎白茯苓砂仁薏仁炒枇杷葉去毛薑炙桑白皮炒沉香磨汁五味子白豆蔻炙甘草丁香人參白朮各五分木香磨汁青皮陳皮杜仲薑汁炒穀芽炒藿香大腹皮洗石斛酒炒半夏曲炒神麯炒隨風子檳榔各三分上水二盅姜三片棗二枚煎八分食遠服五噎入柿幹一個膈氣吐逆入韭白三寸棗五枚同煎遠志酒能托散諸毒治女人乳癰尤效遠志不拘多少用米泔浸洗槌去心上為末每服三錢用好酒一盅調少頃澄清飲之以滓敷患處替針丸治膿成不潰者白丁香硇砂另研真沒藥乳香各一匙糯米即江米四十粒先以礦灰拳大一塊置瓷碗內量入井水待熱氣將息以米排入灰中良久候米如水晶狀取去用之如米未就再用灰制上各另為末然後和勻收貯用時以飯丸麥粒大每用一粒水濕黏瘡頭上其膿自出凡瘡瘍血氣壯實膿成不潰者宜用此藥以泄其毒則肌肉易生瘡口易斂若氣血虧損者須用甘溫之劑以培根本否則不惟不潰且難收斂若附骨疽及緊要之地當及時針砭為善漏蘆湯治腦疽癰疽毒盛實者漏蘆黃耆甘草連翹沉香各五錢大黃一兩微炒上每服四五錢薑棗水煎服破棺丹治瘡瘍熱極汗多大渴便秘譫語發狂大黃三兩半半生半熟芒硝甘草各二兩上為末煉蜜丸彈子大每服一丸童便酒化下白湯亦可萬金散一名內托散治癰疽已潰未潰者有消毒破血之功栝蔞一個杵碎沒藥一錢研大甘草節二錢上酒二碗煎去一碗後入沒藥服牛膠散治癰疽使毒不內攻不傳惡證有益無損牛皮膠廣中明者四兩上用酒一碗重湯煮化加酒服至醉不能飲者加白湯會膿散治惡毒便毒初起妙方白芷殭蠶炒穿山甲煨各二錢大黃四錢乳香沒藥各一錢上為末以當歸四錢用酒水各二盅煎一盅去渣量人強弱或全用或一半調服之此藥若嫌太多則㕮咀為飲大黃生加煎服之尤妙生脈散治瘡瘍胃氣虧損陰火上衝口乾喘促或肢體倦怠肌肉消瘦面色痿黃汲汲短氣汗出不止食少作渴或膿水出多氣血俱虛煩躁不安睡臥不寧或濕熱大行火土合病脾胃虛弱身重氣短或金為火制絕寒水生化之源肢體痿軟腳欹眼黑等症人參五錢五味子麥冬各二錢水煎服香連丸治熱瀉痢疾赤白膿血濕熱侵脾裡急後重黃連淨十兩切如豆粒用淨吳茱萸五兩二味用熱水拌和入瓷罐內置熱湯中頓一日炒至黃連紫色為度去茱萸不用木香每制淨黃連一兩木香二錢半上為末醋糊丸桐子大每服七十丸食前空心米飲下滋腎丸降腎火桂與火邪同體此寒熱用法也凡不渴者病在下焦宜用之良方云或腎虛足熱小便不利肚腹腫脹皮膚脹裂眼睛突出此神劑也黃柏二兩酒拌陰乾知母同上肉桂二錢上為細末熟水為丸百沸湯空心送下二百丸小柴胡湯治邪在肝膽半表半裡之間寒熱往來喜嘔或日晡發熱脅痛耳聾鬱怒痎瘧等證按古方較重今方減用柴胡二三錢半夏人參黃芩各一二錢生薑甘草五七分大棗五七枚水煎溫服若胸中煩而不嘔去半夏人參加栝蔞實若渴者去半夏加人參栝蔞根若腹中痛者去黃芩加芍藥若脅下痞硬去大棗加牡蠣若心下悸小便不利者去黃芩加茯苓若不渴外有微熱者去人參加肉桂溫敷取微汗愈若咳者去人參大棗生薑加五味子乾薑加味逍遙散治瘡瘍肝脾血虛內熱發熱或遍身搔癢寒熱或肢體作痛頭目昏重或怔忡頰赤口燥咽乾或發熱盜汗食少不寐或口舌耳內作痛或胸乳腹脹小便不利當歸芍藥白朮茯神丹皮柴胡各等分甘草梔子各七分姜水煎服三品錠子上品去十八種痔白明礬二兩白砒一兩五錢乳香沒藥各三錢半牛黃三錢中品去五漏及翻花瘤氣核白明礬二兩白砒一兩三錢乳香沒藥各三錢半牛黃二錢下品治瘰癧氣核疔瘡發背腦疽諸惡證白明礬二兩白砒一兩半乳香沒藥各二錢半牛黃三分上將砒末入紫泥罐內次用礬末蓋之以炭火煅令煙盡取出並各藥俱研極細末用糯米糊和為挺子狀如線香陰乾瘡內三四次年深者五六次其根自腐如瘡露在外更用蜜水調搽幹上亦可嘗有一老媼用此治瘰癧索重價始肯治其方法乃是中品錠子絍瘡內以膏藥貼之其根自腐未盡再用去盡更搽生肌藥數日即愈人多異之凡見其治氣血不虛者果驗惟氣血虛者雖潰去亦不能愈蓋此與必效散相為表裡皆攻毒去邪之藥也如神千金方治痔無有不效好信石黃明者三錢打如豆粒明白礬一兩為末好黃丹飛炒五錢蠍梢七個洗淨瓦上焙乾為末草烏光實者去皮生研五錢上用紫泥罐先將炭火煅紅放冷拭淨先下明礬燒令沸次下信入礬內拌勻文武火煅候沸再攪勻次看罐通紅煙起為度將罐掇下待冷取研為末方入黃丹草烏蠍梢三味再同研極細以瓷罐收貯如欲敷藥先煎甘草湯或蔥椒湯洗淨患處然後用生麻油調前藥以鵝毛掃藥痔上每日敷藥三次必去黃水如膠汁則痔頭漸消其年遠者不出十日可取盡日近者俱化為黃水連根去淨更搽生肌之藥凡五痔皆可去之此乃臨安曹五方為高宗取痔封曹官至察使透骨丹此潰膿藥外科不可缺蟾酥硼砂輕粉巴豆各五錢蝸牛二個麝香一分上先將巴豆研如泥次入蝸牛麝香再研後入各藥研極細以小瓷瓶收藏每用少許以乳汁化開先用針輕輕撥破毒頭挑藥米粒許納於瘡口外用清涼膏貼之金銀花酒治一切癰疽發背疔瘡喉痹等症金銀花藤葉搗爛取汁半盅和熱酒半盅溫服甚者不過三五服可保無虞烏金膏治發背中央肉死塗之即腐未死塗之即生若初起腫痛用點數處則解毒頓消若瘀肉腐黑塗之即潰若惡瘡頑瘡元氣無虧久不收斂者內有毒根以紙捻蘸絍其內有等發背因元氣虛弱或因克伐元氣虧損毒氣散漫中黯外赤不腐不潰須服大補之劑中塗三四寸許至五六日間赤黯之界自有裂紋如刀劃之狀中央漸潰腐脫內用純陽之藥以接元氣庶能收斂若妄用刀針去肉出血則陽隨陰散元氣愈傷或塗涼藥則毒氣不解氣血愈虛非徒無益適以害之矣其方用巴豆肉炒黑研為膏點腫處或塗瘀肉上則自化或加乳香少許亦可如塗瘡肉或加香油少許亦可調稀可用若餘毒不斂者以此絍之不致成痛車螯散治癰疽初發腫痛或少年熱盛發背等症急宜宣毒利下熱退為度大人小兒四季皆可服之紫背車螯一隻鹽泥固濟火煅通紅地上出火毒用輕粉甘草各二錢大黃五錢黃芩漏蘆去須瓜根各半兩上為末每服二錢薄荷湯下速利酒亦可蠟礬丸服過一兩以上無不取效最止疼痛不傷臟腑活人不可勝數白礬一兩黃蠟半兩白蜜二錢上和丸如桐子大每服十九丸加至五十丸溫酒送下如未破即消已破即合一日服百粒則有效能防毒氣內攻尤能護膜始終須服半斤瘡愈後服之尤佳治蛇咬溶化白礬乘熱滴傷處痛即止一方用明礬飛過研細以雞子二個取清調礬末稀稠如糊用無灰陳好酒放開服之膿未成者即消已成者從大小便出神效其功大勝黃礬丸五香連翹湯治諸瘡腫初覺一二日便厥逆咽喉塞發寒熱沉香木香麝香丁香各一兩乳香二兩連翹射干升麻獨活桑寄生甘草炙各一兩大黃一兩半木通二兩上㕮咀每服五錢水盅半煎七分溫服取利按丹溪曰精要第一論云不問癰疽瘡癤虛熱冷熱先與內托散五香連翹湯沉麝湯等諸方不冷不熱不問老幼少壯陰陽虛實冷熱多服為妙夫癰疽瘡癤臟腑陰陽有淺深虛實冷熱用藥有補瀉溫涼老幼少壯其稟受厚薄形志苦樂隨年而增損奈何欲以不冷不熱四五方而通治之又以多服為妙此不能無疑也學者當審經絡察病機而處治豈可仗此為通治之法乎隔皮取膿法治諸般腫毒驢蹄細切一兩炒蕎麥麵一兩白鹽半兩草烏四錢去皮上為末水調作餅子慢火炙黃出火毒研米醋調成膏用白紙攤貼患處毒自毛竅而出其腫自退滴滴金治疔瘡硇砂輕粉人言雄黃硃砂麝香少許上為細末每用些少先以針刺開瘡頭貼藥黃水出效扳黃藥治疔瘡走黃用蟾酥飛羅面為丸梧桐子大可將一丸放在面前舌下即時黃出追膿錠子海藏膿內潰不出此藥追之雄黃二錢巴豆肉一錢半輕粉一字共為細末飯和成錠治疔破棺丹疔瘡走黃不止當歸赤芍藥山梔子牽牛各二兩半連翹牡蠣金銀花紫花地丁京三稜甘草各二兩便秘加大黃三兩上為細末煉蜜和丸如彈子大每服一丸食前用童便化開服忌飲酒及生冷硬物治暑天疿瘡方朴硝開水泡洗三二次愈小兒走馬牙疳桑樹白汁擦之自愈永不再發
