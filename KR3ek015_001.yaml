body:
  text: 卷上癰疽原委論癰疽發背為何生好好身軀出此形凡人處世而無疾病者水升火降精祕血盈也養生篇曰毋搖爾精毋勞爾形皈心靜默可以長生此皆遠世俗忘名利無貪嗔卻疾病惟修身保命之志士所能今人豈能及哉蓋謂靜則生水動則生火水能生萬物火能克萬物故百病由火而生火既生七情六欲皆隨應而入之既入之後百病發焉發於內者為風勞蠱膈痰喘內傷發於外者成癰疽發背對口疔瘡此皆言其大略也故成癰者壅也為陽屬六腑毒騰於外其發暴而所患浮淺故易腫易膿易腐易斂誠為不傷筋骨易治之症也疽者沮也為陰屬五臟毒攻於內其發緩而所患深沉故為傷筋蝕骨難治之症也凡年壯氣血勝毒則順年老毒勝氣血則險內被七情干臟腑憂愁思慮總關心七情者喜傷心怒傷肝憂傷肺思傷脾悲傷於魂魄恐傷腎驚傷膽六欲者耳聽聲音眼觀物色鼻聞香氣舌貪滋味心帷大地意幄萬方外有六淫傷氣血風寒暑濕火相臨六淫者風寒暑濕燥火是也皆從外而入之體實之人遇而不中者有體弱之人感而隨發者多又有感之不發邪氣客於臟腑經絡關節之內積襲日久或待內傷或因外感邪氣觸而發之既發之後當參寒熱溫涼邪正勝負而治之膏粱厚味多無忌勞傷房欲致虧陰膏粱者醇酒肥鮮炙煿之物也惟取快意於一時不覺陰消於平日況生是疾者不起於藜藿盡屬於膏粱誰識膏粱味短不及藜藿味長故將五臟多乖變自然六腑不調勻五臟屬五行金木水火土是也相順相生相反相剋所謂相生者昌相剋者亡五臟不和則六腑不通九竅疲癃留結為癰蓋癰疽必出於臟腑乖變關竅不得宣通而發也治當寒邪而痛者以溫熱散之濕腫強痛者滲而導之燥搐攣痛者滋而潤之泄而痛者溫之塞而痛者通之虛而痛者補之實而痛者瀉之陰陽不和者調變之經絡祕澀者沖和之膿脹而痛者開之惡肉侵蝕者去之勞而痛者逸之損而痛者續之此等皆為活法惟在用者詳之發於心上多危險五臟相干事可明五臟者心肝脾肺四臟皆繫於背惟腎經一臟獨居於下其精華津液元氣元神盡行灌溉榮注於上故四臟之火皆賴一臟之水以濟之所謂五臟根本皆繫於腎即此意也凡發癰疽者未有不先傷五臟而後發之且背乃太陽膀胱督脈所主太陽者六經之首領也督脈者十二經絡之統脈也況心乃君主之位豈容毒相犯之凡發於此者危險難治之症心之以下多成順六腑之因亦許評凡瘡生於心之以下者除腎俞一穴外皆為緩六腑者足陽明胃經手太陽小腸經足太陽膀胱經手厥陰心包絡經手少陽三焦經足少陽膽經此六經屬腑其形在下其氣主表其病為癰故發於六經者為輕脾家積毒生肩脊飲食膏粱積毒所致高腫鮮明根腳不過兩肩者為順先宜解毒護心為主次宜內托清心為要間用蠟礬丸護心散防毒攻心如腫平堅硬漸大漸開攻注兩肩胸項腫而不痛者危心經火毒對心臨對心發者乃心火妄動熱極而發之也況心為主宰周身蘊熱流會於此其結為患最易傷人刑截督經害非輕淺況背脊多坑固難起發瘡形落陷腫不高尖治當大降心火急疏蘊熱頂用針通隨行拔法使毒氣內外疏通庶不內攻方為成守保至十五日後內無變症得膿為解如變症漸生堅硬漸大不作膿者死在二十二朝先後但此症貴在早治十中可保其三四也兩肩左右雙生髮肺肝積受不虛名左搭屬肝右搭屬肺俱生於左右肩骨移動之處為可治有此症者先用萬靈丹發汗疏通內外次以清肝解鬱湯柴胡清肝湯氣用四君子湯血用四物湯潰後八珍湯參而調治誠為妥當但此症原起於痰凝氣滯火鬱氣血不調而生正謂郁者開之滯者行之如誤用瘡科解毒泄氣誤補誤攻之藥必致多危蓮子蜂窠防毒陷蜂窠蓮子二發多生於背與心相近與脊中平輕者形長高腫或偏半背重者形斜平塌兩脅俱傷孔似蜂窠突如蓮子瘡形雖畏常能多險多生老弱不堪反取常安常穩大規只怕不純陽治法何妨瘡勢惡護心護膜丸丹須要調停執藥執方活法在乎醫意機參總論法決存亡腰間腎俞發難生腎俞發者生於兩腰陷肉之間或正中亦發凡生於此者最為險候蓋內腎為性命之本藏精藏氣藏神又謂受命先天育女育男育壽此等皆出於腎臟也是疾房勞過度氣竭精傷其臟必虛諸火諸邪乘虛而入既入之後渾結為瘡如本臟稍有真陰制火瘡形自可紅活高腫為膿治以人參養榮湯加山萸五味子黃柏知母及加減八味丸以救其源也若瘡形紫黑乾枯堅硬不作膿者為真陰內敗再無可生之理督脈經虛從項發俗名對口故相稱對口有偏正之不同發於正者屬督脈所主發於偏者乃太陽膀胱所司二者皆起於濕熱上攻凝結而成也督脈發瘡易治因督脈起於下而貫脊行於上故毒氣得之反能衝突高腫膀胱者發瘡雖偏而每為難治蓋膀胱之脈起於巔頂貫項兩傍順下而行乃與瘡毒交會下流故瘡多平塌又太陽膀胱主司寒水其質多冷多沉故瘡於此多難起發形色多難紅活堅硬難潰又易流注兩肩胸項作腫十五日外無膿者必然變黑歸陰故多不治治以黃連消毒飲主之余皆降火化痰解毒清心托裡為要也何期耳後多生髮夭疽鋭毒本非輕發生於耳後一寸三分致命之處誠為險惡之候左為夭疽屬肝木右為鋭毒屬肺金二者皆起於積想在心謀慮不決致火旺而又郁鬱而又旺以成此疾也故形多堅硬頭多隱伏未潰先黑未膿先腐臭穢易生元氣易敗凡生此瘡毒氣多致不得外發發後必內攻而死但此症初生起於隱微令人多不知覺及其知覺毒已入內矣如紅活高腫易膿易腐者俱無妨又有脫疽生手足丹房補術孽根因脫疽初生如粟色似棗形漸開漸大筋骨伶仃烏烏黑黑痛割傷心殘殘敗敗汙氣吞人延至踝骨性命將傾此非天命自喪其身古人有法截割可生今人誰肯割截為名治法雖有詳在後文漫腫難治焮腫易總論中間法可憑漫腫者肉腫瘡不腫是也焮腫者瘡腫肉不腫是也瘡之初起理當升發潰膿之後不可內消宜用托藥如不應者乃毒勝氣血死在旬日或已發出而不腐潰根腳堅硬或軟而散大者急投托藥大補脾胃不應死在二旬若已潰而色不變紅活亦不生肌收斂瘡口暈大腫痛不減胃氣不回急須峻補不應者乃脾崩死在月餘諸瘡另自分門説豈許輕於紊此呈癰疽治法總論癰疽發背怎生醫不論陰陽先灸之不痛灸至痛疼灸不痛時凡看癰疽腦項等發大瘡先要從容立定主意以見標日期為始到今幾日看瘡形與日期可否相對相應則多吉不應則多險次看受病之源發於何臟腑出於何部位但身體有上下部位有險否形色辨順逆精神論有無再看年紀老壯氣血盛衰發陰發陽毒深毒淺以陽為易治者多生以陰為難治者多死方診脈之虛實可知順險以決其終凡瘡未潰前脈要太過一二至已潰後又宜不及二三分此為脈病相應首尾自無變症如其相反恐防不測但看法全在目力精巧與心相應一一參明表裡透徹然後方定治法凡瘡七日以前形勢未成無氣未弱不論陰陽表裡寒熱虛實俱先當灸輕者使毒氣隨火而散重者拔引郁毒通徹內外火引毒氣混合為陽方能發腫作痛然後可汗可攻或消或托兼求標本忝治必以脈合藥以藥合病如此治之自然無錯矣故藥難執方全在活法大抵關節首尾俱不可損傷元氣脾胃為要內服蟾酥丸一服外將神火照三枚凡瘡初起七日之前或已灸之後未服他藥宜用蟾酥丸一服得汗解為妙或萬靈丹發汗亦可所謂毒氣隨汗而散最為捷徑如二藥服後發汗不出此乃表裡閉密之故毒亦不輕當神妙拔根方施治神燈照法亦不可用之太早如瘡四五日之間形未聚毒未出若早用之恐留郁在內毒反難出須用在八九日之後瘡勢已定毒氣已聚未成膿腐之時用此照之已成者自高未成者自消不潰者自潰不脫者自脫亦且解毒活血消腫散瘀之良法也用膏貼頂上敷藥四邊圍凡瘡最忌風寒所襲初起之時或已灸之後俱當用太乙膏蓋貼頂上功效在於拔毒提頂提膿防禦風寒不入如焮痛高腫陽瘡七日之後瘡頭自有黃色稠膿相黏膏上余腫紅色光亮鮮明每日宜用蔥湯洗淨換膏貼之其正膿定在十一日前後出也此為易治易安之症如七日之後瘡不大腫高四邊又不焮痛瘡頭亦無膿意相黏此為陰陽相等之症宜用化腐紫霞膏塗瘡頂上外以膏藥蓋之換至十日外瘡頂漸腐余腫漸高似有膿意之象其正膿只在十五日之後可出也此為以險成順之症至於二十日以後無膿者乃純陰之症縱治亦無效矣又如瘡之四圍根腳余腫其功又在敷藥收束根本庶不開大初起時宜用金黃散敷於四邊拔毒消腫止痛既潰後當用鐵桶膏箍之庶瘡根漸收漸緊但諸瘡原因氣血凝滯而成切不可純用涼藥冰凝肌肉多致難腐難斂必當溫暖散滯行瘀拔毒活血藥用之方為妥當也氣盛兮頂自高而突起血盛兮根腳束而無疑氣血者人之所原稟老者尚或有餘少者亦有不足人之命脈全賴於此況百病生焉失此豈能無變獨瘡科尤關係不淺但腫瘍時若無正氣衝托則瘡頂不能高腫亦不能焮痛潰膿則無真陰相滋瘡根不能收束色亦不能紅活收斂凡瘡頂高根活不論老少氣血有餘俱可無妨又宜交會明白交會者瘡根與好肉交界之處高低自然分別明白者瘡形與好形各無混雜以此觀之瞭然明白矣高腫起者忌用攻利之藥以傷元氣平塌漫者宜投補托之劑以益其虛凡瘡初發高起者內臟原無深毒毒發於表便得托裡以速其膿忌內消攻伐以傷脾氣膿反難成多致不能潰斂又瘡初起不高不赤平塌漫者元氣本虛急宜托裡溫中健脾催托毒氣外發庶無變症矣內熱甚者量加消毒清劑便祕燥者必須通利相宜使臟腑得宣通俾氣血自流利腫瘍時內熱口乾脈實煩躁便祕喜冷者此為邪毒在裡急與寒涼攻利宜內疏黃連湯四順清涼飲內消沃雪湯俱可選用又兼有表症防風通聖散去麻黃或雙解散加桔梗天花粉又或小便不利者兼入天水散五苓散俱可合用務使二便通利以杜其源又有元氣素虛者恐不勝前藥以托裡消毒散加蜜炒大黃或兼豬膽導法必得通利為度首尾俱要閉而不結通而不泄得臟腑和平表裡透徹方可托裡排膿內補之藥又如潰瘍時雖有口乾便閉臟腑不和不利等症此因潰後膿水出多內亡津液氣血虛耗不能榮潤臟腑所致其人必脈細而數口和而干飲食減少好飲熱湯此乃虛陽之火為病非前有餘可比只宜養氣血滋津液和臟腑如此治之則二便自和亦無變症常有誤行攻利多致不救者矣十日之間瘡尚堅必用披針當頭點破凡瘡十日以後自當腐潰為膿如不作膿腐仍尚堅硬者此屬陰陽相半之症瘡根必多深固若不將針當頭點入寸許開竅發泄使毒氣無從而出必致內攻也倘內有膿又便易出此為開戶逐賊之意也亦有十日外瘡雖不腐潰形尚紅活焮熱腫痛此雖膿遲後必有出此又不必針之蓋緣元氣不能充足或失用補托之藥又誤用寒涼或蓋覆未暖多致膿遲有此症者宜用補中健脾大補托藥以得膿為效又以十五日至二十一日為期過此外者縱有稀膿但元氣被毒相拒日久必致耗散誠難歸結也半月之後膿亦少須將藥筒對頂拔提有膿血之交黏必腐肉之易脫如瘡半月後仍不腐潰不作膿者毒必內陷急用披針品字樣當原頂寸許點開三孔隨瘡之深淺一寸二寸皆可入之入針不痛再深入不妨隨將藥筒預先煮熱對孔竅合之良久候溫取下如拔出之物血要紅而微紫膿要黃而帶鮮此為血氣營運活瘡其人必多活又謂膿血交黏用藥可全色鮮紅活腐肉易脫如拔出瘀血紫黑色敗氣穢稀水無膿者此為氣血內敗死瘡所謂氣敗血衰神仙歡哉此等之瘡難矣其人必在月終亡且如斯時內有膿而不得外發者以針鉤向正面鉤起頑肉用刀剪當原頂剪開寸余使膿管得通流庶瘡頭無閉塞已用藥筒拔膿之後外既有孔內竅亦通瘡期又當大膿發泄之後如膿尚少亦非自然得出故瘡頭必有瘀腐塗塞內肉亦有頑膜阻隔多致膿管不通自難出也須用針鉤起瘡頂頑肉以披針利剪隨便取去寸余頑硬之肉取之微痛血出俱自不妨隨用兩手輕重得宜從瘡根焮處漸漸捺至中間剪出膿管處內有聚膿自然湧出以黃色稠厚為吉其膿日漸多者為輕反此為慮此功務使塗塞者開之令膿毒外發也頻將湯洗切忌風吹凡瘡未潰前或已用照藥後俱要煎蔥艾湯每日淋洗瘡上一次甚者早晚二次使氣血疏通易於潰散又已潰時及藥筒提拔之後尤宜避風先去舊藥用方盤瘡下靠身放定隨用豬蹄湯以軟絹淋湯瘡上併入孔內輕手捺淨內膿庶敗腐宿膿隨湯而出以淨為度再以軟帛疊成七八重勿令太乾帶湯覆於瘡上兩手輕盈旋按片時帛溫再換如此洗按四五次使氣血得疏通患者自然爽快毒氣得解腐肉易脫疼痛得減此手法之要大瘡不可缺也候腐脫已見紅肉時洗後隨用紅玉膏挑於手心捺化搽新舊肉上外用膏蓋四邊根腳已消不必箍藥每日如此不數日膿盡腐脫新肉頓生再加內補調理得宜輕瘡只在月餘大瘡不過七十日必完口而愈關節在於斯時變生出於此候關節者陽瘡以十四日為關陰瘡以二十一日為節此時務要出膿勢定不可過釀但膿出方自腐脫腐脫方自肌生肌生方自收斂收斂方自瘡平如斯時不得膿者後必有變為一關順後必多順一關逆後必多逆治當大補得全收斂之功切忌寒涼致取變生之局凡瘡潰後五臟虧損氣血大虛外形雖似有餘而內臟不足法當純補乃至多生已潰時發熱惡寒膿多自汗作痛者十全大補湯虛熱少睡飲食不甘者黃耆人參湯皮寒虛熱咳嗽有痰者托裡清中湯四肢倦怠肌肉消瘦面黃短氣者人參養榮湯膿多心煩少食發躁不睡者聖愈湯脾虧氣弱身涼脈細大便溏泄者托裡溫中湯飲食不甘噁心嘔吐者香砂六君子湯脾虛下陷食少虛熱間作者補中益氣湯腎虛作渴不能相制心火者加減八味丸仿此選用蓋托裡則氣血盛而脾胃旺使膿穢自排毒氣自解死肉自去新肉自生飲食自進瘡口自斂若不務補托而誤用寒涼謂之真氣虛而益虛邪氣實而益實多致瘡毒內陷膿多臭穢甚則脈洪大渴面紅氣短此真氣虛而死矣蓋瘡全賴脾土調理必要端詳脾為倉廩之官胃為水穀之海胃主司納脾主消導一表一里一納一消運行不息生化無窮五臟六腑藉以生養又謂得土者昌失土者亡蓋脾胃盛者則多食而易飢其人多肥氣血亦壯脾胃弱者則少食而難化其人多瘦氣血亦衰所以命賴以安病賴以安況外科尤關緊要善養脾胃者節飲食調寒暑戒喜怒省勞役如不然則精神氣血由此而日虧臟腑脈絡由此而日損肌肉形體由此而日削所謂調理一失百病生焉故脾胃不可不詳也冬要溫床暖室夏宜淨幾明窗人之氣血喜暖而惡寒又謂遇寒則結遇熱則散況瘡乃肌肉破綻之病若不防禦風寒最為易襲凡看瘡時冬要圍爐暖室逼盡余寒夏宜淨幾明窗庶外風不入然後方可揭膏洗貼飲食何須戒口冷硬膩物休飧人之病中腫痛時自然痛傷胃氣諸味不喜直待潰後膿毒一出胃氣便回方欲思食彼時但所喜者便可與之接補脾胃如所思之物不與此為逆其胃氣反致不能食也切要不可太過惟恐生冷傷脾難化硬物肥膩滑腸故禁之癰疽雖屬外科用藥即同內傷古之以外科推為雜病之先蓋此傷人迅速關係不淺故特設於前也且如癰疽腦項疔毒大瘡形勢雖出於外而受病之源實因於內也及其所治豈可舍於內而治外乎所以外不起者內加托藥表熱甚者內必清解血虛宜用四物湯氣虛宜用四君子湯脈虛足冷溫中脈實身熱涼膈以此推之內外自無互異病要論久新要法在於寬治猛治病有新久勢有緩急如受病之初元氣未弱治當隨症迎刃而解若懼行霸道猛劑定不能決效於危急時也用藥中病如表症盛者用萬靈丹大加表散里症急者以內疏黃連湯急與通行又如受病日久邪正相拒其元氣示有不衰弱者縱有餘症雜症壤症俱當先固其本而後調之和之散之使病氣漸退元氣漸醒飲食漸進根本漸實則余患再無不愈之理藥必求標本功莫別於先醫後醫若一概之攻補恐兩途之誤用物理皆有標本而病之標本尤莫切焉身體之標本五臟為本六腑為標五臟主裡主血六腑屬表屬氣疾病標本以初病為本以傳病為標又以元氣為本病氣為標此所以寒熱表裡緩急之病應汗下補瀉和解之方凡治病者必先治其本後治其標若先治其標後治其本使邪氣滋甚其病益增又謂緩則治其本急則治其標假如先得瘡疾而後得泄瀉嘔吐食少等症宜捨本從標之法治之候瀉止嘔定食進方再治瘡余皆仿此又説陽變為陰內外被寒涼克伐瘡本發於陽者為癰為熱為實為疼此症易治患者不覺以為小恙不早求治反又外受風寒內傷生冷或再被醫者失於補托而又以涼藥敷圍以圖內消合病家之意多致氣血冰凝脾胃傷敗使瘡毒變在十一日未出膿之前形勢與好肉相平不疼不熱軟慢相兼瘡孔止流清稀肥水更兼身體不熱脈亦細微飲食厭飧精神昏短有此症者變入真陰雖強投溫中健脾之劑不應者百無一生如瘡變在十五日之後已出膿時毒氣已將外發如有調攝失宜誤食冷物忽變為陰者急投托里溫中湯十二味異功散輕者十全大補湯俱倍加參耆桂附以救之須得瘡熱作痛膿出身溫脈起食進者為吉但瘡原本於陽其人故得多生者有矣豈期陰變為陽首尾得辛熱扶衰病分真似理究陰陽瘡本發於陰者為疽為冷為硬為虛此症難治患者知覺欲生而故將辛香酒煎大方熱藥以助之醫者又欲患處高腫焮熱作膿敷以熱藥圖其起發故瘡得藥性大熱轉陰為陽其瘡雖得微腫微熱微痛微膿但瘡形終不似真陽紅活不得真厚黃膿如此者不久復歸陰矣但瘡原本於陰其人多死凡值此症若患者方寸不雜托信於醫而醫者又得機關透徹治法得宜內外融和每每中節其中亦有可生者十中一二矣既有針工之異説豈無線藥之品詳凡瘡毒既成當托其膿膿既成當用針通此舉世自然之良規也必當驗其生熟淺深上下而針之假如腫高而軟者發於肌肉膿熟用針只針四五分腫下而堅者發於節脈膿熟用針只在六七分腫平肉色不變者毒氣附於骨也膿熟用針必須深入寸許方得見膿又輕按熱甚便痛者有膿且淺且稠重按微熱方痛者有膿且深且稀按之陷而不起者膿未成按之軟而復起者膿已成按之都硬不痛者非膿即瘀血也或濕水也所謂有膿即當針膿孔宜順下若膿生而用針氣血反泄膿反難成若膿熟而不針腐潰益深瘡口難斂若膿深而針淺內膿不出外血反泄膿淺而針深內膿雖出良肉受傷元氣虛者必先補而後針症隨膿退又有氣癭腫而綿軟不痛者血癭腫而內疊成塊者頑毒結之日久皮腐肉紫根硬四邊紅絲纏繞者以及結核之症漸大漸痛漸腐者以上四症俱不可輕用針刀掘破若妄用之定然出血不止者立危但用針之法妙在膿隨針出而寂然無所知覺也至於癭瘤瘰癧諸痔諸漏疔毒堅硬頑瘡此等症者若非線藥之功亦不能刻期取效夫線藥乃有五六種難以概説與其各病相應者亦隨症而善用之湯散丸丹要在發而必中神聖工巧誠為學者機關醫善用方如將善用兵善於水者涉海潛波渡津破浪善於陸者穿山越嶺附葛攀藤奇偶者鼓舞飛揚蹊徑者浮沉鑽鑿弱者可守強者當敵此為將用兵之大法凡為醫者理皆仿此其要在知人之強弱識病之內外究病之淺深察時之順逆然後可汗可攻或吐或下或宜和解或宜補益又知某湯善汗某散善攻某丸善和某丹善補因其病而用其方如矢發機投之必中中之必勝勝之則病無不愈之理此為用方之大法也又如望聞問切神聖智巧亦可兼之所謂望其形而通其神聞其聲而明其聖問其由而得其工切其脈而續其巧此四者誠為初學之繩墨也至於千萬百症難將説盡短長方不在多心契則靈症不在難意會則明方不心契症不意會如疏淡之交寡遊之地性情形勢不切何以便托用哉故藥不應病病不應藥即此據也治在活法貴在審詳動靜世務不同勞逸機關亦異昔之受病從外而來今之受病從內而發又古者多實設方宜散宜宣今者多虛治法宜滋宜補若醫者不識古知今一概施與必多致其夭亡者也用之必得其當醫斯可以稱良治病則例歌外科之瘡有治例説與君家須切記病端百出別根因方法一囊豈同類熱與寒通與祕其中消息知端的通多不足祕多餘熱實寒虛分症治陽似陰陰似陽其中妙理要推詳不分表裡一例治輕變重而重變亡醫者貴乎多應變不可偏執用其方且如表症惡寒宜用荊防敗毒散里症發熱可將內疏黃連湯瘡勢已成托裡消毒散誠為正法內膿將潰十全大補湯最得相當人參養榮湯治潰後虛熱發作木香流氣飲散結腫寒濕為殃飲食不甘定用香砂開胃精神怯少須將參朮回陽陰虛陽虛須八珍最為要領盜汗自汗得獨參一味可強潰後多疼乳香定痛散功奇莫緩脾虛下陷補中益氣湯功效尤良曰燥譫言瀉實火須黃連解毒湯心煩衄血理虛陽必犀角地黃湯古法治癰疽稱述仙方活命飲今時醫發背還期神授衛生湯蟾酥丸在外科稱為獨品護心散解內毒號曰無雙詎知蠟礬丸護膜護心可羡淡中有味還贊玉紅膏生肌生肉堪誇壞里呈祥身涼自汗腹痛腸鳴嘔逆豈逃異功散睡臥不寧虛陽發躁膿多定用聖愈湯生脈散接虛羸音雷脈來微細歸脾湯除驚悸睡得安康竹葉石膏湯治虛煩身熱者何須疑慮麥冬清肺飲除膈熱有痰者無待商量金鯉湯治肺癰吐膿氣急元龜丹攻結毒臭腐頑瘡風熱生瘡通聖散瘡瘍狂躁破棺丹小柴胡湯除客邪往來潮熱大防風湯攻腿膝寒濕為殃咽腫咽疼定用清咽利膈散斑紅斑紫豈逃化斑解毒湯八味丸解口乾妙藥二神丸治脾泄奇方香連丸為臟腑瀉痢通用甘露飲治口齒腐爛相當六和湯和脾止吐瀉雙解散解表裡內傷逍遙散善治女人諸病保元湯常扶赤子多傷皮膚毛髮乾焦蘆薈丸效應甚捷咽喉口齒腫痛冰硼散功實非常滋腎丸治下元腎虛不固涼膈散解上焦膈熱多煩九龍丹消魚口吞之滅迹二蚊散行濕腫服下安康呂祖一枝梅止痢定驚稱為仙藥真君妙貼飲消疼止痛號曰神方痔漏癭瘤疔毒古誇三品錠癰疽流注諸風今羡萬靈丹柴胡清肝湯治鬢疽肝膽有效黃連消毒飲醫對口督脈尤良小兒口內生疳必用人中白散大人咽喉腫痛須將金鎖匙湯下疳新久珍珠散小便淋澀木通湯玉真散破傷風有效復元湯療跌撲稱強提肩散治胳膊強直作痛拈痛湯除痛腿風濕相傷小便生疳龍膽瀉肝服可羡大頭腫痛普濟消毒飲何妨便毒懸癰內消散吞何足慮臀癰腿病耆柴湯下自無殃又有女子陰瘡能腫能疼能至癢在人活法或消或補或蟲妨蓋夫男子之囊癰瀉肝經之濕熱小兒赤遊丹解毒兼砭血凡治楊梅瘡戒熏為至切舌下發痰包利剪方能泄出如雞蛋清消痰是真訣結毒與頑瘡紫金膏可設風瘡徹骨癢雄黃散效絶疔瘡先刺血內毒宜汁汗泄禁灸不禁針怕綿綿者毒陷也不怕鐵鐵者入針堅硬有聲又有失榮腫堅硬如岩凸強陰失道症形狀要分別婦人之乳岩此中一例決未破肉嶒稜已潰流臭血如此幾般症古今無治説瘡有數百種難以都陳白惟在一點心何須三寸舌學者若精靈萬事皆通徹此為粗糙歌可譏亦可閲癰疽灸法並禁灸瘡穴凡瘡初起除項之以上余皆用艾火隨瘡勢大小灸艾壯之多少用蒜切成薄片安於瘡頂上著艾炷點火三壯一換蒜片初灸覺痛以不痛似癢為止初灸不痛以知痛癢為住如初灸全然不覺痛癢宜去蒜當明灸之又陰瘡日數多者艾炷不及其事以蒜搗爛鋪於瘡上艾亦鋪蒜上點火灸之必知痛甚為效此為火氣方得入里知痛處方是好肉蓋艾火拔引郁毒透通瘡竅使內毒有路而外發誠為瘡科第一法也貴在乎早灸為佳又有禁灸數症頭乃諸陽之首純陽無陰之處凡生瘡腫俱是亢陽熱極所致如再加艾火使毒氣熾甚隨後反加大腫最能引動內痰發之必死面生疔毒亦然又有腎俞一穴在於兩腰脊傍系內腎命根所繫之處此穴發瘡多因房勞素虧腎水枯竭而成若再加艾灸以爍其源必致內外乾涸多成黑陷昏悶而死又有患者元氣素虛發瘡多不高腫其人體必倦怠精神必短而昏脈必浮散空虛數而不鼓此內無真氣抵當火氣如灸之其人必致昏憒而死常謂艾火不虧人此言誤之多矣醫者亦宜詳察之論病生死法初生如粟里可容谷外面如麻裡面如瓜外面如錢里可容拳起勢大終無害未老先白頭無膿軟陷休瘡從疙瘩起有膿方腫潰氣昂昂不治自安康根高頂又高八十壽還饒焮腫易腐爛任大終無恙瘡高熱焮疼雖苦必然生瘡軟無神氣癰補方為益肉腫瘡不腫畢竟生疑恐膿穢不進食泄瀉黃泉客瘡色豬肝紫無膿必定死綿潰不腐爛內怕葡萄嵌仰臥不知疼陰症命難生腐盡有敗氣笑里終生戾散根瘡平塌神仙無治法久病目露神必定命難存面忽似塗脂十日後分離敗中有紅肉雖重生門路新肉如板片不食終須變手足皮枯稿血敗身難保唇白眼無神腹脹瀉將傾醃氣不滃氣雖重多生意眼眶黑氣濃癰疽怕此逢房中香馥馥是病終為福瘡熱身微熱輕病何須説生死此中求片言一可決察形色順逆凡看人之病兼視其形色後與脈病相參誠識於始以決其終百無一失矣何以知之陰病見陽色腮顴紅顯陽病見陰色指甲呈青此二者俱死又身熱脈細唇吻反青目珠直視者死面如塗脂色若土黃油膩黑氣塗抹者死唇舌乾焦鼻生煙煤眼神透露者死形容憔悴精神昏短身形縮小者死喘粗氣短鼻焮睛露語言譫妄者死循衣摸床遺尿失禁撮空者死頭低項軟眼視無神吸吸短氣者死皮破無血肉綻爛斑麻木不知痛癢者死齒黃色如煮豆唇白皮理無紋耳黑枯焦不聽人中縮而坦平口張氣出無回閉鼻煽相隨呼吸行汗出如珠不散痰若膠而堅凝口血紅如肺色指甲彎而帶青神昏神浮神亂神離緇衣生滿面黑氣慘天庭逢之都沒命法在此中評病有三因受病主治不同論三因者內因外因不內外因此説從於先古其詞意尚有發而未盡者內因起於七情蘊結於內又兼厚味膏粱熏蒸臟腑房欲勞傷虧損元氣乃五臟受之其病由此而發者多在富貴肥胖者十有八九其見症形多堅硬根蒂深固二便不調飲食少進外軟內堅平陷無膿表實裡虛毒多難出此即內傷之症也故曰內因外因者皆起於六淫體虛之人夏秋露臥當風取涼坐眠濕地以致風寒濕氣襲於經絡又有房事後得之其寒毒乘虛深入骨髓與氣血相凝者尤重或外感風邪發散未盡遂成腫痛此肌肉血脈筋骨受之其病由此外來者發之多在不善調攝跌撲勞碌人十有八九症多寒熱交作筋骨疼痛步履艱辛濕痰流毒以及諸風癱瘓口眼歪斜半身不遂風濕風溫天行時毒等症此即疾病之外感也故曰外因又有不內外因內無七情干內外無六淫傷外何由來也其病得於飢飽勞役喜怒不常飲食者冷熱不調動作者勤勞不惜以致臟腑不和榮衛不順脾胃受傷經絡凝滯故為疾者外無六經形症內無便溺阻隔其病多生於肌膚之間似瘰癧痰注氣痞癭瘤之屬治法不必發表攻裡只當養氣血調經脈健脾和中行痰開鬱治之法為最善調理須知凡人無病時不善調理致生百病況既病之後不加調攝而病豈能得愈乎其調治有法初起病時先看病者元氣虛實次看瘡之陰陽險否然後用藥調治當攻即攻可補便補不可因循耽誤以致變症不測也且患者又當安定心神相忘諸念毋使倉皇乃保神氣不得變亂也再順天時假如夏熱坐臥不可當風忌置水於榻前床下冬寒常要溫和非柴火不可開瘡看視倘有寒侵致生多變又未潰之先毒氣內作有口乾渴症者涼物類當少少與之以滋蘊熱至膿潰之後後冷硬物一概禁之不然傷脾損胃膿必難成致瘡軟陷又難收斂飲食須當香燥甘甜粥飯隨其喜惡毋食過飽宜少宜熱宜濃方無停滯又得易化故也如大瘡潰後氣血兩虛脾胃並弱必制八仙糕早晚隨食數餅接補真元培助根本再熬參朮膏如患者脾胃俱虛飲食減少胸膈不寬飲食無味者用白朮膏三匙人參膏二匙清米湯空心化服喜飲者酒化亦可若精神短少昏沉多睡自汗勞倦懶於動作者用人參膏三匙白朮膏二匙亦酒化服如肌膚粗澀面蒼不澤或大便血出虛祕以及皮乾發稿者同地黃膏各二匙和服或飲陽春酒更妙其功強健精神頓生氣血開胃助脾潤肌榮骨此二藥其功非小大瘡不可缺之實非草藥之比病者當信用之乃無更變視者又多反覆不常故有易愈難愈之態實在乎得此失此之規也雜忌須知凡病雖在於用藥調理而又要關於雜禁之法先要灑掃房屋潔淨冬必溫幃夏宜涼帳庶防蒼蠅蜈蚣之屬侵之一切尼僧孝服經行婦女及遠客生人開瘡時俱當忌見牛犬腥膻醃臘熏藏之物俱能作渴生干瓜果梨柿菱棗生冷等類又能損胃傷胃雞鵝羊肉鴿子蚌蛤河豚蝦蟹海腥之屬並能動風發癢油膩煎炒烹炙鹹酸厚味等件最能助火生痰赤豆蕎麵動氣發病惱怒急暴多生痞滿飲食太過必致脾殃瘡愈之後勞役太早乃為羸音雷症入房太早後必損壽不避風寒復生流毒不減口味後必瘡癢無度大瘡須忌半年小瘡當禁百日誠為知命君子也瘡瘍看法初起頂高根活色赤發熱焮腫疼痛日漸高腫者順已成焮痛皮薄光亮飲食如常二便調和身溫者順已潰膿稠色鮮不臭腐肉自脫焮腫易消身輕者順潰後膿厚稠黃新肉易生瘡口易斂飲食漸進者順初起頂平根散色暗微腫不熱不疼身體倦怠者逆已成腫堅色紫不作膿不腐潰惟口乾多煩躁者逆已潰皮爛內堅不腐腫仍不消痛仍不減心煩者逆潰後膿水清稀腐肉雖脫新肉不生色敗臭穢者死腫瘍治法起初知痛或不痛起發或不發毋論陰陽表裡日數遠近但未見膿者俱宜灸之既灸不知痛癢明灸之焮腫發熱疼痛有時脈來浮數無便祕者宜藥托之身體拘急脈緊惡寒飲熱就暖者邪在表也宜汗之腫硬痛深口乾便祕身熱脈實者邪在裡也宜下之焮痛勢甚煩躁飲冷舌乾口燥者火在上也宜清之腫痛堅硬背如負石噁心乾嘔邪毒在內解毒拔之腫痛日深內膿不出瘀肉塗塞瘡口者急宜開割之軟慢不作膿及不腐潰者陽氣虛也壯脾胃助陽氣身涼自汗手足並冷六脈虛細便泄陽脫也急溫之潰瘍治法膿熟不潰瘡不焮熱食少便溏者脾虛也補托溫中膿清或多瘡口散大不生肌者裡虛欲變症峻補之腐肉雖脫新肉生遲如凍色者肉冷肌寒大溫氣血潰後食少心煩不睡發熱作渴脾弱陰虛補中益氣身涼脈細倦怠懶言食不知味者脾弱也醒脾助胃風寒襲於瘡口皮白綻而不收斂者外照而內溫補潰後面黃肌瘦膿水清稀瘡色淡白者當香燥助脾脈大無力細澀微沉自汗身涼者氣血俱虛峻補之出血或膿多五心煩熱燥甚不眠者亡陽也急補之瘡口已合經犯房勞或值急暴復崩潰者仍助氣血癰疽諸症瘡名十律背之左右謂疽癰手膀肩臂亦相同肺疽居右癰居左蜂癰左右近喉嚨耳後右為鋭毒看夭疽左耳後相逢左右兩肩名搭手井疽止發在心中流注牽藤六七成發於心上止臍平脅疽生在脅肢下陰疽大體近箕門穿踝疽穿姑拐下腳氣原來腳底生左為便毒右魚口鶴膝風從膝眼成肩下臑癰腋下疽喉嚨上下氣癰醫當脈兌疽君可記三寸相離穿骨基紅絲疔從手上起蛾子喉風口內隨腎疽當腎生左右三里穴發附陰疽離臍四寸為嚇癰再高三寸號幽癰腸癰還從臍突起胸疽乳子心肺中合谷一疔名虎口蛇頭魚腹指頭逢腦後一疽名玉枕莫作如常一樣同肩疽樂疽居右手石榴離肘上三分左元陰右襠疽發咬骨陰包穴上生洲疽腎上腿附骨佛頂疽生腦頂門人世毒瘡當切記敢教患者即安生顴骨為疔唇上疽鬢邊所發亦疽醫眉中風眉傍侵腦黑疔耳內不為奇鼻內生疔當速療透腦原來發際基眉毛瘭疽能大毒頰疔魚眼近腮齊馬刀瘰癧氣癭瘡一氣生來在頸項火毒龍泉唇上下對口原來發下藏牙根唇上癰莫異牙下生之疔一行頂牙縫突為疔治休作人間容易瘡心肝脾肺腎癰疽當看胸中穴道醫更有黃頭並白泡發無定處速如飛左為坐馬右下馬尾骨頭尖顴口疑此物殺人能致命火急攻醫切莫遲婦人之乳有數種高腫為癰堅硬疽還有乳岩真惡症腫如頑石破如墟鈕扣之風生頸項褐帶風瘡腳下需又有濕臁瘡等疾總生下腿上安居嬰兒走馬爛牙疳黑腐沿開臭不堪赤遊丹毒渾身到鵝口瘡苔滿口漫風瘡奶癬多搔癢血灌膿窠痛欠安還有心脾諸熱症口疳重舌一般看煉元明粉法冬至後用潔淨朴硝十斤用水一斗五升白蘿蔔五斤打碎同硝入鍋內煮化候湯滾足撈去蘿蔔將竹絲箕以綿紙二層攤鋪箕內架在新缸上以硝湯徐入箕內候折再添以湯濾盡為度將缸搭在天井露三日其硝結在缸邊傾去余水瀝乾為止將硝取下再用砂鍋頓炭爐上將硝一碗化開煎滾以銅匙鏟攪將成凝結時鏟入小罐內上空寸許再下硝煉如此已畢每一罐下用三釘品字樣釘入土地上留寸半在外將罐浮頓釘頭上用瓦片蓋口周圍用段磚砌百眼爐圍繞離罐寸半許將著炭火入爐內四圍底火頂火一概相護候罐硝紅為度次日取出硝來預用大綿紙攤在潔淨陰土地上將硝碾細用絹篩在紙上一錢厚再不許多將門扇俱已關閉不許與人見之三日後其硝自然復活色白如粉輕虛成片將鉢盛收紙蓋之上再用亂紙蓋之上再用亂紙寸許以收潮氣庶不凝結此品最能降火化痰清利臟腑怪症服之可蠲狂燥用之即愈搜除百病安斂心神況此服之不傷元氣惟久病瀉痢者不宜大人每服三四錢小兒五分至一錢皆可俱用白滾湯或蔥湯空心化服候行二三次隨飲稀粥自然爽健精神調和臟腑津液頓生百病如失又煅過硝石六兩加硃砂三錢青黛一錢冰片一錢五分共碾細末照前篩紙上再用紙蓋一層四邊以戒尺壓緊勿令走氣候三日外取起密收又名陽春紫雪最治失心忘志顛癇健忘小兒急驚大人異症每服五分至一錢俱用淡竹葉燈心湯化服屢有奇效不可盡述元明粉乃神仙保命服食每一斤加生熟甘草末一兩蔥湯化服二三錢令人悅澤容顏輕身耐老矣取蟾酥法服蟾不拘大小其酥俱有用闊銅鑷蟾眉稜高肉上微緊拔出酥來凝聚鑷里多則指下陰乾聽用其取過之蟾避風二日仍送青草園中自然不傷其生如取之便見風下水俱成破傷風顛狽而死製附子法大附子一兩外方用隨數幾枚以童便浸淹三寸每日換便浸至夏三冬五再換童便煮盡二香為度去皮臍線穿陰乾或日中曬硬亦可收藏聽用制炒諸藥人參潤色明亮堅實主輕泡不堪天門冬泡去心麥冬去心生地酒浸熟地酒蒸白朮米泔浸炒蒼朮米泔浸炒黃耆蜜水拌炒甘草生用補托消毒炙熟酸棗仁炒研遠志泡去心微炒五味子炒研肉蓯蓉去鱗酒洗牛膝酒洗破故紙炒當歸酒洗白芍微炒黃色白蒺藜去刺元參去根香附童便浸炒柴胡去蘆黃芩酒炒黃連解毒生用止嘔薑汁拌炒龍膽草酒炒知母鹽水拌炒栝蔞仁去殼油貝母去心陳皮去里桔梗微炒防風去蘆乾薑炒黑附子童便浸炒煮半夏薑汁煮川烏炮去皮草烏泡去皮尖巴戟泡去心微焙南星煨有為末入牛膽內威靈仙去根仙茅米泔浸蒸去皮三稜泡澤瀉蒸大黃實人生用虛人灸海藻酒洗昆布酒洗切絲牡丹皮去梗王不留行炒碾牛蒡子炒碾連翹去梗碾金銀花支梗葉牽牛生用炒用地骨皮去梗肉桂去粗皮茯苓去匏粗皮枸杞去蒂山梔碾炒焦琥珀布包捶碎燈心煨研如面細黃柏鹽水拌炒山茱萸去核杜仲鹽水拌炒斷絲桑皮蜜水拌炒辛夷去蒂乳香去油為末沒藥去油為末枳殼麩炒厚朴薑汁製炒巴豆去油為霜皂角去皮弦子煨五倍子去蛀末炒蓮肉泡去皮心山楂去核桃仁泡去皮尖杏仁泡去皮尖微炒芒硝煮提淨石膏煅碾末雄黃透黃紅明亮硫黃去腳硇砂淨明潔白硼砂白色透明砒白色明亮者有生煨兩用自然銅醋煅七次黃丹水飛炒紫龍骨生用煅用牛黃輕虛色黃麝香去皮毛犀角鎊末羚羊角鎊末龍齒煅存性蜂蜜煉去白沫蟬蛻去土斑蝥米炒去翅足殭蠶去絲微炒全蠍酒洗去毒蜈蚣炙去頭足蚯蚓翻去腹土田螺去殼曬乾牡蠣煅研石決明煅人中白煅研珍珠豆腐內煮數滾布包捶碎同燈心碾末紅鉛法注末卷藥品應制炒泡炙者録之不泡炙者未録凡藥必導雷公泡炙入藥乃效如未制生藥入煎不為治病反為無益譬如人食肴饌不用烹庖生食者豈不害人當熟思之仙方活命飲古今不同論古人朴實七情干涉者少而從風寒暑濕外感凝滯者多故設仙方活命飲攻散所滯之腫服此得效者十常八九乃患者五臟不虛耳今人穿鑿太過七情煩攪之甚而內臟無有不傷每見此症曾服過此藥其瘡必不起發脾胃再無不損若瘡不起脾胃傷敗患者豈有得生至此自於天命今之治法不論首尾標本必先固脾次行托藥謂本立而道生病無不活豫見如此幸同道者察焉醫家五戒一戒凡病家大小貧富人等請視者便可往之勿得遲延厭棄欲往而不往不為平易藥金毋論輕重有無當盡力一例施治自然生意日增毋傷方寸二戒凡視婦女及孀婦尼僧人等必候侍者在旁然後入房診視倘旁無伴不可自看設有不便之患更宜真誠窺視雖對內人亦不可談此因閨閫故也三戒不得出脫病家珠珀珍貴等物送家合藥以虛存假換如果該用令彼自制入之倘服不效自無疑謗亦不得稱讚彼家物色之好凡此等非君子也四戒凡為醫者不可行藥登山攜酒遊玩又不可片時離去凡有抱病至者必當親視用意發藥又要依經寫出藥帖不可杜撰藥方受人駁問五戒凡娼妓及私夥家請看亦當正己視如良家子女不可任意兒戲以取不正視畢便回貧家者藥金可璧看病回只可與藥不可再去以圖邪淫之報醫家十要一要先知儒理然後方知醫業或內或外勤讀先古明醫確論之書須旦夕手不釋卷一一參明融化機變印之在心慧之於目凡臨症時自無差謬矣二要選買藥品必遵雷公炮炙藥有依方修合者又有因病隨時加減者湯散宜近備丸丹須預製膏藥愈久愈靈線藥越陳越異藥不吝珍終久必濟三要凡鄉井同道之士不可輕侮傲慢交接切要謙和謹慎年尊者恭敬之有學者師視之驕傲者遜讓之不及者薦拔之如此自無謗怨信和為貴也四要治家與治病同人之不惜元氣斫喪太過百病生焉輕則支離身體重則喪命治家若不固根本而奢華費用太過流蕩日生輕則無積重則貧窘五要人之受命於天不可負天之命凡欲進取當知彼心願否體認天道順逆順取人緣相慶逆取子孫不吉為人何不輕利遠害以防報之業也六要凡里中親友人情除婚喪疾病慶賀外其餘家務至於饋送來往之禮不可求奇好勝飯食只可一魚一菜一則省費二則惜祿謂廣求不如儉用七要貧窘之家及遊食僧道衙門差役人等凡求看病不可要他藥錢只當奉藥再遇貧難者當量力微贈方為仁術不然有藥而無火食者其命難保八要凡有所蓄隨其大小便當置買産業以為根本不可收買玩器及不緊物件浪費錢財又不可做入銀會酒會有妨生意必當一例禁之自絶謗怨九要凡應用各樣物具俱要精備齊整不得臨時缺少又古今前賢書籍及近時名公新刊醫理詞説必購備參閲以進學問此誠為醫之本務也十要凡奉官衙所請必當速去毋得怠緩要誠意恭敬告明病源開具方藥病愈之後不得圖求匾禮亦不得言説民情致生罪戾間不近公自當守法以上五戒十要乃保身保家守成之法故直言而不文當置於座右朝夕一覽若有賢能子孫倘遵而行之則可以成家立業若不聽信必有飢寒不足之憂凡人何不預聽直待臨時追悔進退兩難將何及矣
