body:
  text: 卷下經絡人身之有經絡猶地理之有界分治病不知經絡猶捕盜不知界分其能無誅伐無過之咎乎岐黃問答以經絡為主惟經絡一明然後知症見何經用何經之藥以治之瞭然無謬如古之善射御者自有得心應手之妙焉陀云癰疽之作其行也有處其主也有歸如心之發於喉舌肺之發於皮膚脾之發於肌肉肝之發於筋肋腎之發於骨髓是也陰毒發於下陽毒發於上腑之發於外臟之發於內發於下者得之緩發於上者得之速感於腑者易治感於臟者難療故內曰壞外曰潰上曰從下曰逆近骨者多冷久而不愈化血生蟲蟲則多癢少疼或先癢後疼近膚者多熱久而不愈傳氣成漏漏則多疼少癢或不疼不癢發於虛處者多險發於節而相應者不治應為內外通潰也十二經補瀉藥品手少陰心經補當歸生地黃茯神遠志酸棗仁麥門冬柏子仁山藥蓮肉圓眼肉人參紅藍花瀉黃連枳實木香貝母天竺黃鬱金赤茯苓元胡索溫石菖蒲藿香沉香木香桂枝麻黃涼連翹丹參石蓮子梔子犀角牛黃硃砂石膏引經獨活細辛燈心圓眼手厥陰心包絡經補人參黃耆肉桂沉香菟絲子破故紙瀉大黃朴硝梔子烏藥溫大附子肉桂乾薑沉香川芎白豆蔻柏子仁烏藥涼黃連梔子丹皮柴胡薄荷滑石引經柴胡桂佐之川芎青皮手太陽小腸經補石斛牡蠣甘草梢瀉木通赤茯苓車前子紫蘇羌活藁本檳榔大黃瞿麥溫巴戟天茴香烏藥砂仁益智仁涼滑石木通梔子茅根車前子豬苓澤瀉芒硝引經羌活藁本黃柏足厥陰肝經補當歸熟地黃酸棗仁阿膠木瓜沙參薏苡仁枸杞子菟絲子山茱萸白朮蓮肉甘草蒺藜瀉白芍藥赤芍藥柴胡青皮枳實青黛羌活木賊甘菊蒲黃桃仁蔓荊子常山五靈脂益毒草前胡溫木香肉桂香附子涼黃連黃柏胡黃連龍膽草草決明牛黃羚羊角車前子甘菊花地榆引經川芎行上青皮行下柴胡烏梅足少陽膽經補當歸酸棗仁山茱萸五味子瀉柴胡青皮黃連白芍藥川芎貝母栝蔞鉤藤天竺黃溫乾薑肉桂陳皮半夏涼黃連黃芩柴胡竹茹甘草引經川芎行上青皮行下柴胡足太陰脾經補人參白朮茯苓甘草白芍藥山藥蓮肉白扁豆木瓜蒺藜當歸黃耆薏苡仁芡實陳皮大棗眼圓肉瀉枳實大腹皮山楂麥芽神麯半夏南星檳榔三稜萊蔔子升麻防風石膏豬苓元胡索桑寄生溫砂仁白豆蔻藿香破故紙黑乾薑官桂大附子蘇葉肉果木瓜蒼朮吳茱萸丁香涼黃連元明粉竹瀝連翹大黃引經白芍麻黃大棗蓮肉足陽明胃經補人參白朮黃耆石斛山藥蓮子芡實薏苡仁糯米白糖瀉枳實厚朴大腹皮前胡三稜莪朮檳榔大黃石膏礞石溫肉桂肉果大附子砂仁藿香半夏蒼朮白豆蔻川芎香附乾薑涼葛根知母石蓮子梔子滑石竹茹胡黃連引經葛根升麻白芷手太陰肺經補人參沙參黃耆麥冬阿膠五味子紫菀百部知母款冬花木瓜山藥茯苓蒺藜瀉防風蘇梗羌活前胡生薑桑白皮蘇子橘紅石膏杏仁貝母栝蔞南星枳殼薄荷白芥子白芍元胡索葶藶鼠黏子萊蔔子香薷荊芥溫乾薑生薑半夏白豆蔻縮砂木香藿香桂枝香附麻黃涼枯芩竹葉竹瀝童便羚羊角馬兜鈴山梔天門冬元參桔梗藕節枇杷葉元明粉地骨皮引經白芷升麻蔥白生薑手陽明大腸經補蓮肉糯米白砂糖薏苡仁粟殼木香肉豆蔻龍骨牡蠣瀉大黃芒硝枳實桃仁檳榔蔥白麻仁溫人參乾薑半夏肉桂吳茱萸涼黃芩槐花大黃地榆胡黃連連翹石膏秦艽引經葛根升麻白芷足少陰腎經補杜仲菟絲子蒺藜破故紙山茱萸山藥石斛巴戟天人參白朮當歸熟地枸杞五味牛膝龜板淫羊藿何首烏鱉甲鹿茸鹿角龍骨牡蠣續斷肉蓯蓉韭子覆盆子瀉澤瀉豬苓知母元胡索甘草茯苓木通溫大附子桂心破故紙黑乾薑縮砂仙茅沉香涼黃柏知母丹皮天門冬地骨皮山梔元參竹瀝引經獨活肉桂牛膝鹽酒足太陽膀胱經補龍骨續斷益智仁橘核瀉豬苓澤瀉滑石車前子木通瞿麥茯苓溫茴香烏藥沉香山茱萸桂枝麻黃縮砂涼膽草石蓮子防風羌活蔓荊子茵陳葶藶大黃黃柏石膏引經藁本羌活黃柏手少陽三焦經補人參黃耆白朮藿香瀉柴胡枳殼枳實青皮山慈菰溫大附子厚朴乾薑沉香涼連翹滑石膽草地骨皮引經柴胡川芎青皮散品凡藥之性輕虛者諸臟腑皆能發散是以不屬經絡也羌活獨活升麻防風荊芥細辛藁本麻黃秦艽防己牛蒡子香薷夏枯草山豆根五靈脂射干青蒿蔥白頭漏蘆蟬蛻走品凡藥之體重濁者諸臟腑皆能走瀉是以不屬經絡也川烏草烏三稜莪朮威靈仙穿山甲葶藶海藻昆布五加皮撫芎常山青黛巴豆益母草桑寄生標使治宜如腫瘍初起審症處分必以一藥為標使如神授衛生散用金銀花當歸蒼朮復煎散用蒼朮十全大補湯用夏枯草蠟礬丸用菊花湯通聖散用漏蘆之類每用一兩煎湯復煎群藥其應如響此飛霞子之祕廖也丹溪云阿膠飲牛膠丸屬金屬土實大腸壯胃止瀉黃蠟丸入大腸有補國老膏化毒行經遠志酒金銀花酒皆有補性歸血歸心善用者以之配入腫瘍之散結潰瘍之補虛亦奏捷效宜觸類而長之可也又如諸毒生於巔頂者諸藥俱宜酒浸酒炒酒煎酒服為使為因所為在上者因而越之也汗書云汗之則瘡已為外有六經之形症內無便溺之阻隔飲食如故兩便自調知不在裡也左脈洪緩關脈帶弦外感客邪也故宜汗之使榮衛通邪氣去矣如冬月寒致腠理必用辛溫之劑以托之如托裡溫中湯紺珠丹之類又云助表不以取汗為功為蟾酥硃砂雄黃等解毒之類乃取汗之峻劑也又云瘡家雖身疼痛不可發汗汗之則痙為無表症也即有表症然亦不可大汗大汗則表虛不膿後必難治汗出不利小便汗止則陽氣復小便自利也下腫瘍時見五實者為邪氣在裡宜寒涼藥攻利之如內疏黃連湯之類次以托裡排膿之藥補之潰瘍時雖有口乾便閉等症由內亡津液所致必脈細而數口和而干食少喜熱乃虛火也惟補氣血養津液健脾胃則二便自和庶無變症如小便閉雖腫瘍時不必豬苓澤瀉以導水惟用參耆歸芍及托裡消毒散消息之自效瘡瘍面赤火鬱也發之見風脈風症者散之大便燥急者潤之鬱冒者為昏迷也俱宜汗之以上之症慎不可下是以瘡瘍惟在閉而不結通而不瀉為規渴瘡瘍作渴不問腫潰但脈數發熱而渴用竹葉黃耆湯脈不數不發熱或脈數無力而渴或口乾用補中益氣湯若脈數便祕用清涼飲尺脈洪大按之無力而渴用加減八味丸若治口燥舌黃飲水不歇此丸尤妙大法瘡瘍作渴若焮痛發熱便利調和者上焦熱也用竹葉石膏湯腫痛發熱大便祕澀者內臟熱也用四順清涼飲焮腫痛甚者熱毒蘊結也用仙方活命飲漫腫微痛者氣血虛壅也用補中益氣湯若因胃火消爍而津液短少者用竹葉黃耆湯若因胃氣虛而不能生津液者用補中益氣湯若因胃氣傷而內亡津液者用七味白朮散若因腎水乾枯作渴或口舌乾燥者用加減八味丸或先口乾作渴小便頻數而後患疽或疽愈後作渴飲水或舌黃乾硬小便數而疽生者尤惡候也苟能逆知其因預服加減八味丸補中益氣湯以滋化源可免後患薛氏癰疽發渴乃氣血兩虛用參耆以補氣歸芍以養血或忍冬丸黃耆六一湯丹溪瘡作渴甚急與神仙追毒丸取下惡毒清膻湯千金漏蘆湯五香連翹湯六味車螯散萬金散皆可選用利後仍渴卻用生津補氣藥津液生氣血完渴自止伍氏大渴而與利藥非明示脈證何以知其當下後言利後仍渴卻用補藥又不明示脈證恐是但有大渴必下下後尚渴方與補藥古人治未病如此用藥可乎況渴屬上焦當腫瘍時猶或可用若潰後渴多因氣血之虛何待利後方議其虛也丹溪口乾與口渴不同不宜用丹溪鎮墜用之其禍如反掌用桑枝煎五味湯以救陰水精要丹溪曰此妙方也而不言食味起火怒氣生火房勞激火吾恐渴亦未易除也病疽愈後發渴多致不救惟加減八味丸最妙蓋癰疽多因虛而得疽安而渴者服此丸則渴止安而未渴者服此丸永不發渴或未疽而先渴者服此不惟渴止疽亦不作李氏前證屬腎水枯涸虛火上炎口乾作渴飲水無度或舌黃作裂小便頻數或痰氣上壅煩躁不寧或二三年先作渴飲水或口舌生瘡兩足發熱痰氣上壅或瘡愈三四年而口乾作渴小便頻數急用前藥多有復生者能逆知其因預服前丸可免此患若兼手足厥冷真陽虛也宜服八味丸大凡瘡後審其腎水不足用加減八味丸中氣虛弱用補中益氣湯氣血虛弱用十全大補湯陽氣虛寒加薑桂如不應用八味丸薛氏托裡消毒散加減法飲冷作渴熱毒也加赤小豆知母如不應暫用竹葉黃耆湯善食作渴胃火也加石膏山梔天花粉如不應暫用竹葉石膏湯食少體倦作渴胃氣虛也去連翹金銀花加人參白朮如不應暫用補中益氣湯膿多作渴氣血虛也去三味加熟地五味子如不應暫用十全大補湯加五味子麥門冬口乾舌燥腎氣虛也去三味加熟地山茱萸山藥如不應兼六味丸又不應佐以補中益氣湯自汗內熱口乾胃氣虛也去三味加參耆歸術如不應暫用六君子湯盜汗內熱口乾陰血虛也去三味加熟地麥冬五味子如不應暫用當歸六黃湯竹葉黃耆湯治癰疽大渴發熱或瀉或小便如淋薛氏曰渴乃七惡中之一也此方治之其功甚捷亦有左手脈浮大而熱或渴者宜發散表邪右手脈沉實而熱或渴者宜疏去內邪若潰後作渴或小便如淋或脈大無力者屬氣血虛也宜大補氣血亦有潰後熱不止或作渴遂以為敗證不治若素有胃火或胃經熱毒未盡胃脈尚數者仍宜服前湯服而脈反大熱渴愈作斯為敗證蓋因真氣虛而邪氣實也今之潰瘍畏石膏黃芩二藥性冷多不肯服若胃脈未靜非此藥莫能治也若因循日久煎熬氣血膿血愈多氣血愈虛反成敗證矣治者當舍證從脈可也大抵瘡瘍之證七惡內見一二惡者甚為可畏虛中見惡證者不治實證無惡候者自愈托裡黃耆湯薛氏曰愚用此方治氣虛作渴甚效若氣血俱虛或膿血大泄作渴或兼發熱者宜托裡養榮湯托裡養榮湯黃耆六一湯常服終身可免癰疽實治渴補虛之要劑也七味白朮散治胃氣虛或因克伐或吐瀉口乾作渴飲食少思竹葉石膏湯治癰疽胃火盛腫痛作渴元參散治癰疽成膿水不能下食心煩口乾煩渴飲水四肢羸瘦葛根散治癰腫熱盛口乾煩渴或時乾嘔乾葛飲治發背作渴忍冬丸治渴疾既愈預防發疽先將忍冬草入瓶內後入無灰酒微火煨一宿取出曬乾少加甘草俱為末又以所浸余酒糊丸如梧桐子大每服六七十丸溫酒下又治五痔諸癭桑枝方大治口渴取嫩桑枝細切一升妙以水三升煎一升日服五七劑更多尤妙抱朴子云療風痹乾燥臂痛腳氣四肢拘攣上氣眩暈久服補肺消食利小便輕身聰明令人光澤其功不能盡述薛氏曰桑枝補血氣生津液輕身明目補肺腎之良劑也五味子湯治腎水枯涸口燥舌乾薛氏曰此方乃六一湯生脈散之復方滋化源之良劑若腎水既涸虛火上炎而口燥作渴者須佐以加減八味丸加減八味地黃丸李氏曰一貴人病疽未安而渴作日飲水數升豫用前方諸醫大笑云此藥若能止渴我輩不復業醫矣仍用木瓜烏梅百藥煎等渴愈甚不得已用此丸三日渴止久服氣血益壯飲食加倍嘔精要云嘔逆有二證一證為初發不曾服內托散伏熱在心一證為氣虛脾氣不正其伏熱在心者與內托散三兩帖氣虛者宜嘉禾散有寒熱宜正氣散兼與山藥丸以補腎丹溪曰諸逆衝上嘔噦皆屬於火內托散性涼故有降火之理若嘉禾散補力已少徒溫暖以助火耳山藥丸補腎以壯下焦之陰粗為近理然治嘔須分先後腫瘍時當作毒氣上攻治之潰瘍後當作陰虛治之若年老因疽潰後嘔逆不食者宜參朮膏峻補取效佐使藥隨時隨證加減恐用山藥丸緩急未易得力河間謂瘡瘍嘔者濕氣侵胃也藥中宜倍加白朮瘡瘍作嘔不可泥於毒氣內攻而概用敗毒等藥如熱甚焮痛邪氣實也仙方活命飲解之作膿焮痛胃氣虛也托裡消毒散補之膿熟脹痛氣血虛也先用托裡散後用針以泄之焮痛便祕熱蘊於內也內疏黃連湯導之若因寒藥傷胃而嘔者托裡健中湯胃寒少食而嘔者托裡益中湯中虛寒淫而嘔者托裡溫中湯肝木乘脾土而嘔者托裡抑青湯胃脘停痰而嘔者托裡消中湯脾虛自病而嘔者托裡益黃湯鬱結傷脾而嘔者托裡越鞠湯若不詳究其源而妄用攻毒之藥則腫者不能潰潰者不能斂矣薛氏丹溪雖云腫瘍當作毒氣攻心治之潰瘍當作陰虛治之亦大概之言耳今之熱毒內攻而嘔者寡脾胃虛寒而嘔者多豈可膠柱而鼓瑟哉又曰欲嘔作嘔或外搽內服寒涼或痛甚或感寒邪穢氣而嘔皆胃氣虛也托裡消毒散去三味加藿香倍參朮三味連翹白芷銀花熱盛脈數精要與漏蘆湯單煮大黃湯等若不甚熱脈緩弱只投五香連翹多熱盛脈數去死已近豈湯丹溪曰熱盛脈數若腫瘍時臟腑祕而體實者猶可與也若潰瘍膿血出可下乎緩弱之脈古人皆以為邪毒已散五香之飛走升散其可用乎以上準繩瘡瘍作嘔不問已潰未潰惟以脈實而數喜飲冷者為毒氣內攻下之脈弱而喜溫者為陽氣不足補之大成痛夫瘡瘍之證候不同寒熱虛實皆能為痛止痛之法殊非一端世人皆謂乳沒可以止痛殊不知因病制宜自有活法故因熱而痛者以寒涼之劑折其熱則痛自止也因寒而痛者以溫熱之藥尉其寒則痛自除也因風而痛者除其風因濕而痛者除其濕燥而痛者潤之塞而痛者通之虛而痛者補之實而痛者瀉之膿鬱而閉者開之惡肉浸潰者引之陰陽不和者調之經絡滯澀者利之憂愁者遠志酒飲之虛塞而痛者乳香沒藥止之大抵癰疽不可不痛不可大痛若大痛悶亂者危薛新甫云瘡瘍之作由六淫七情所傷其痛也因氣血凝滯所致假如熱毒在內便祕而作痛者內疏黃連湯導之熱毒熾盛焮腫而作痛者黃連解毒散治之不應仙方活命飲解之瘀血凝滯而作痛者乳香定痛散和之作膿而痛者托裡消毒散排之膿脹而痛者針之膿潰而痛者補之若因氣虛而痛四君加歸耆血虛而痛四物加參耆腎虛而痛六味地黃丸口乾作渴小便頻數者加減八味丸此皆止痛之法也托裡消毒散加減法若高腫焮痛熱毒也加黃連漫腫微痛氣虛也去金銀花連翹加參術腫赤作痛血凝滯也加乳香沒藥如不應暫用仙方活命飲膿出反痛氣血虛也去金銀花連翹白芷加參耆歸地漫腫不痛或肉死不潰脾氣虛也去三味加人參白朮如不應加薑桂更不應急加附子準繩三味金銀花連翹白芷寒熱虛實皆能為痛止痛之法殊非一端隨症施之其痛自止不必拘拘於乳沒也又瘡瘍不可不痛不痛為胃氣虛極也不治不可大痛兼煩悶者不治再麻癢者更為惡候大成出血瘡瘍出血因五臟之氣虧損虛火而錯經妄行也當求其經審其因而治之若肝熱而血妄行者四物炒山梔丹皮苓朮肝虛而不能藏血者六味地黃丸心虛而不能主血者四物炒連丹皮苓朮脾虛熱而不能統血者四君炒梔丹皮若脾經鬱結用歸脾湯加五味子脾肺氣虛用補中益氣加五味子氣血俱虛用十全大補湯陰火動用六味丸加五味子大凡失血過多見煩熱發渴等證勿論其脈急用獨參湯以補氣經云血生於氣苟非參耆歸術甘溫等劑以生心肝之血決不能愈若發熱脈大者不治凡患血症皆當以犀角地黃湯為主芹洲氏云失血症有瘀者寒涼慎用僵肉治背瘡肉長疾皮不及裹見風即成僵以寒水石燒研為細末敷瘡上再用銅緑細末上之肉即不作僵矣梅瘡攣急牽陰入腹古方療惡瘡癰腫或連陰髀間疼痛急攣牽入小腹不可忍一宿則殺人用茴香苗葉搗取汁一升服之日三四用其滓以貼腫上冬月根亦可用此外國方永嘉以來用之起死神效圖經寒熱身熱而欲衣者熱在皮毛寒在骨髓溫之身不熱而欲去衣者寒在皮毛熱在骨髓清之飲食腫時不食為痛傷胃氣潰後痛止自能食也垣云瘡瘍食肉反補胃氣乃自棄也此禁之膏粱丹石之變非藜藿及虛弱者之通論也若脾胃弱者即有所禁忌亦當少與之不與則逆其胃氣反不思食禁忌之要在生冷傷脾硬物難化肥膩滑腸惟宜斟酌與之可也又服藥後忌飲冷水犯之效遲膿必再作藥忌用藥之法如執權衡若大勢已退仍用悍霸之藥為誅伐無過失內經之旨矣如敗毒散有表症者宜之多則損氣流氣飲氣結胸滿者宜之多則敗血內補十宣散在冬月可助內托之功能移深居淺然燥榮瀉衛之藥太多在夏月及虛之甚者勿用五香散腫瘍時用之似有暢達之理潰瘍時用之則犯重虛之戒護心散能解丹石之毒若不因此及老年病深症憊者禁用蟾酥等丸皆有砒硇之輩乃取汗之峻劑也治初起寒熱拘急疼痛脈沉細者為毒氣內陷者宜用若身熱脈洪及已潰者禁與玉樞丹為下毒之藥無取膿之功而體虛者已成者勿用垣云一經受病止責其一經不可干擾余經如流氣飲通行十二經則諸經皆為所損矣禁之辨舌舌紅濕潤如常者吉青黃赤白黑胎者重乾燥碎裂疼痛者死內陷始則高腫至十數日內外忽平塌者此內攻之候也急宜托裡生肌肌肉者脾胃之所主收斂遲速由氣血之盛衰惟補脾胃此內治也瘀腐不盡不可以生肌如驟用生肌反增潰爛務令毒盡則肌自生加生肌藥此外治也如肌生如榴子紅豔或有白膜為善若肌白而平且無紋理或膿清氣穢為毒連五臟氣血枯竭也危驗膜潰瘍驗膜用軟薄綿紙封瘡口令患者用意呼吸之紙不動者未透膜也忌用嚏法恐鼓破膜不救陽症變陰陽症變而為陰者草醫涼藥之過也於十一日之前未有膿時投溫中健脾之藥如不應為純陰不治至十五日之後已出膿時投托里溫中湯及十二味異功散輕者十全大補湯倍加參耆桂附以救之須得瘡熱作痛膿出食進身溫脈起為吉所為原本於陽者故生陰症變陽陰症變而為陽者大方熱藥之驟也雖得微腫微紅微痛微膿終不似真陽紅活亦不得稠厚黃膿其瘡不久復歸陰矣所為原本於陰者故死潰瘍外治附腫瘍針口治法腫瘍初潰或已開針恐針口易合隨用綿紙的捻蘸元珠膏插之或用黃蠟化開入香油少許作捻如釘須裹線一條為心將蠟捻插入針口內留線頭在外以膏蓋之次日換插如前瘡口去腐肉法瘡口腐肉不出者用線紙做捻取捻毛頭於腐上絞之絞住瘀肉徐徐拔出如未淨再取之次塗元珠膏如腐已淨塗絳珠膏四圍腫處貼紺珠膏瘀膿壅腫不出搗大蒜調松香末敷之瘡潰口中有黑疔治法瘡已潰爛中有黑疔突兀如箸頭堅痛不可忍者用紫絳真香銼豆大炒焦黑為末摻疔上其四圍潰處用蘭雪散摻之黑膏蓋之三二次則疔盡去次換生肌藥頑肉不去治法頑腐不去壯實者用生南星末加冰片摻之膏蓋過宿去腐如井隨換生肌等藥虛弱者用人參末摻之過宿洗之三二次腐肉自脫且易收斂瘡口努肉治法瘡口努出如蛇頭者有四著風著水著怒著手擠皆能致之風邪乘襲者補中益氣湯加防風天麻風寒凝滯者十宣散加羌活天麻肝火血燥生風者加味逍遙散加羌活天麻如小兒其母肝火生風者加味小柴胡湯次用加味逍遙散加漏蘆天麻更外兼尉法或用烏梅煅存性加輕粉少許摻之即收有翻花如石榴者用銀針於珠上刺去黑血三五次即收平復瘡不生肌治法頑瘡疔瘡臁瘡杖瘡久不生肌者瘡有膜也用玉簪花根於石臼內杵爛敷之扎緊三日一換五七次而愈瘡不收口瘡不收口因於虛者須大補之外用人參珍珠等分為末摻之即痂凡生肌藥必用人參湯浸過曬乾再用人乳浸過其功始捷瘡口皮嫩瘡雖收口而皮嫩外惡風寒者用小米煮飯乘熱盛碗內以絹帛罩之敷於患處蒸之三五次愈瘡潰誤入毒水瘡潰時誤入毒水或誤入刺至骨腫痛者用皂角子七個大幹蝦蟆一個胡椒十五粒入鍋內瓦蓋文火煅煙盡取出為末先用溫水洗淨拭乾摻之膏蓋良久毒水盡出有刺者自見一用黃丹蛤粉等分炒變色摻之誤入一切毒水及皂角水驢馬尿糞以致疼痛者用糯米粉砂糖各三兩生甘草一分為膏貼之毒水自出馬汗入瘡馬汗入瘡腫痛者用馬鞭子取手執處燒灰存性為末和諸膏塗之或豬脂和塗或用冬瓜皮陰乾為末敷之張景嶽云凡癰毒焮腫赤痛甚者雖內治之法已具然煎劑功緩而急痛難當者必須外用敷藥既欲止其痛又欲散其毒則無如降癰散之神妙也降癰散景嶽新方治癰疽諸毒消腫止痛散毒未成者即消已成者斂毒速潰可愈若陽毒熾盛而疼痛勢凶者宜先用此方其解毒散毒之功神效最速若堅頑深固者宜用後方薄荷辛者佳用葉野菊花連根葉各一握土貝母半握茅根一握上乾者可為末鮮者可搗爛同貝母研勻外將茅根煎濃湯去渣用調前末乘熱敷患處仍留前剩湯頓暖不時潤於藥上但不可用冷湯冷則不散不行反能為痛約敷半日即宜換之真妙方也後方凡疽毒堅頑深固及結核痰滯宜用此方薄荷倍用半南星土貝母朴硝各等分石灰風化者亦倍用或倍倍用之上同為末用鹽醋調杵稠黏敷患處經宿干即易之不必留頭若膿成者留頭亦可或炒熱攤絹上隔絹貼之亦可或用麻油調或用熱茅根湯調亦可若欲止痛速效加麝香或冰片少許更妙芹洲氏云古方治疔瘡俱用野菊花余每治類疔毒瘡單用野菊花內服外敷甚效陰寒症忌之益母膏活血散瘀效用針勿忌尻神立齋曰針灸之法有太乙人神周身血忌逐年尻神逐日人神而其穴有禁針禁灸之論犯者其病難瘳理固然也但瘡瘍氣血已傷肌肉已壞急宜迎而奪之順而取之非乎人針灸之比何忌之有外科精義云瘡瘍之症毒氣無從而解膿瘀無從而泄反攻於內內既消敗欲望其生豈可得乎危惡之證發於致命之處禍在反掌腹癰囊癰二便不通胸腹脹悶唇疔喉痹咽喉腫塞其禍尤速患者審之薛氏治鄰人手指患疔麻癢寒熱噁心左半體皆麻脈數用奪命丹不應又用解毒之劑麻癢始去乃作腫痛欲針而值尻神病家不從愈腫強針之諸證頓退又用解毒之劑而愈油紙法一用天麻子仁數粒鉛粉錢許研爛入桐油碗許打勻棉花蘸刷令遍與不油紙相間鋪之壓之須頻揭換不黏一以生桐油熟豬油平兌如法油紙
